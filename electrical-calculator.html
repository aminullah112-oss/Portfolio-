<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Engineering Toolkit</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#22c55e;
}
.light {
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  position:sticky;
  top:0;
  background:var(--card);
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  background:var(--accent);
  border:none;
  padding:8px;
  border-radius:5px;
  cursor:pointer;
}

.container {
  padding:10px;
}

.card {
  background:var(--card);
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}

h2 {margin-top:0;}
</style>
</head>

<body>

<header>
<h2>⚡ Electrical Toolkit</h2>
<button onclick="toggleMode()">🌗</button>
</header>

<div class="container">

<!-- POWER -->
<div class="card">
<h2>Power Conversion</h2>
<input id="kw" placeholder="kW">
<input id="pf" placeholder="Power Factor (0-1)">
<button onclick="kwToKva()">Convert</button>
<p id="kvaResult"></p>
</div>

<!-- OHMS -->
<div class="card">
<h2>Ohm's Law</h2>
<input id="v" placeholder="Voltage (V)">
<input id="r" placeholder="Resistance (Ω)">
<button onclick="calcCurrent()">Calculate Current</button>
<p id="iResult"></p>
</div>

<!-- CABLE -->
<div class="card">
<h2>Cable Size</h2>
<input id="load" placeholder="Load (A)">
<select id="material">
<option value="1.5">Copper</option>
<option value="1.2">Aluminium</option>
</select>
<button onclick="cableSize()">Calculate</button>
<p id="cableResult"></p>
</div>

<!-- BREAKER -->
<div class="card">
<h2>Breaker Size</h2>
<input id="current" placeholder="Load Current (A)">
<select id="type">
<option value="1.25">General</option>
<option value="1.75">HVAC</option>
</select>
<button onclick="breaker()">Calculate</button>
<p id="breakerResult"></p>
</div>

<!-- TRANSFORMER -->
<div class="card">
<h2>Transformer</h2>
<input id="tload" placeholder="Load (kW)">
<button onclick="transformer()">Calculate</button>
<p id="tResult"></p>
</div>

</div>

<script>

// DARK MODE
function toggleMode(){
 document.body.classList.toggle("light");
}

// kW → kVA
function kwToKva(){
 let kw = parseFloat(document.getElementById("kw").value);
 let pf = parseFloat(document.getElementById("pf").value);
 let kva = kw/pf;
 document.getElementById("kvaResult").innerText = "kVA = " + kva.toFixed(2);
}

// OHMS
function calcCurrent(){
 let v = parseFloat(document.getElementById("v").value);
 let r = parseFloat(document.getElementById("r").value);
 let i = v/r;
 document.getElementById("iResult").innerText = "Current = " + i.toFixed(2) + " A";
}

// CABLE
function cableSize(){
 let load = parseFloat(document.getElementById("load").value);
 let factor = parseFloat(document.getElementById("material").value);
 let size = load * factor;
 document.getElementById("cableResult").innerText = "Recommended Size ≈ " + size.toFixed(1) + " sqmm";
}

// BREAKER
function breaker(){
 let current = parseFloat(document.getElementById("current").value);
 let factor = parseFloat(document.getElementById("type").value);
 let size = current * factor;
 document.getElementById("breakerResult").innerText = "Breaker ≈ " + size.toFixed(1) + " A";
}

// TRANSFORMER
function transformer(){
 let load = parseFloat(document.getElementById("tload").value);
 let kva = load/0.8;
 document.getElementById("tResult").innerText = "Transformer ≈ " + kva.toFixed(1) + " kVA";
}

</script>

<footer style="text-align:center;padding:10px;">
Designed for Electrical Engineers ⚡
</footer>

</body>
</html>
